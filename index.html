<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>30 Days Monster AR - Fixed SLAM</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: monospace; background: #000; }
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.9); color: #0f0; z-index: 9999; text-align: center;
        }
        .ui-game {
            position: fixed; top: 20px; width: 100%; text-align: center; 
            z-index: 100; color: white; pointer-events: none; display: none;
        }
        .btn-capture {
            position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
            padding: 20px 40px; background: red; color: white; border: 2px solid white;
            border-radius: 50px; font-weight: bold; display: none; z-index: 100;
        }
        #scan-msg { position: fixed; top: 50%; width: 100%; text-align: center; color: #fff; z-index: 50; }
    </style>
</head>
<body>

    <div id="overlay">
        <h1>RADAR INITIALIZED</h1>
        <p>Gunakan Chrome di Android & koneksi HTTPS.<br>Gerakkan HP untuk memetakan lantai.</p>
        <button onclick="startExperience()" style="padding: 15px 30px; background: #0f0; border: none; font-weight: bold;">START RADAR</button>
    </div>

    <div class="ui-game" id="ui">
        <h2 id="day-text">HARI 1</h2>
        <div id="progress-text">Scanning Area: 0%</div>
    </div>

    <div id="scan-msg" style="display:none;">Gerakkan kamera ke arah lantai sampai monster muncul...</div>

    <button id="btn-capture" class="btn-capture" onclick="captureMonster()">TANGKAP!</button>

    <a-scene 
        webxr="requiredFeatures: hit-test, planes; optionalFeatures: dom-overlay; overlayElement: #ui;"
        embedded vr-mode-ui="enabled: false">
        
        <a-assets>
            </a-assets>

        <a-entity id="reticle" visible="false">
            <a-ring color="#0f0" rotation="-90 0 0" radius-inner="0.1" radius-outer="0.15"></a-ring>
        </a-entity>

        <a-entity id="monster" 
                  gltf-model="" 
                  scale="0.5 0.5 0.5" 
                  visible="false"
                  class="targetable"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
        </a-entity>

        <a-entity camera>
            <a-entity raycaster="objects: .targetable; far: 50" cursor="rayOrigin: mouse;"></a-entity>
        </a-entity>
    </a-scene>

    <script>
        const monsters = ["new_sirenhead.glb", "horror_skunx_cartoon_cat.glb", "huggy_wuggy_stylized.glb"];
        let day = parseInt(localStorage.getItem('monster_hunt_day')) || 1;
        let lastPlayed = localStorage.getItem('monster_hunt_last_date');
        let progress = 0;

        function startExperience() {
            document.getElementById('overlay').style.display = 'none';
            document.getElementById('ui').style.display = 'block';
            document.getElementById('scan-msg').style.display = 'block';
            initGame();
        }

        function initGame() {
            const today = new Date().toDateString();
            if (lastPlayed === today) {
                alert("Area aman. Kembali lagi besok!");
                return;
            }

            document.getElementById('day-text').innerText = `HARI ${day} - LEVEL ${Math.floor((day-1)/30)+1}`;
            
            // Pilih model
            const modelFile = monsters[(day-1) % monsters.length];
            document.getElementById('monster').setAttribute('gltf-model', `assets/${modelFile}`);

            // Simulasi Progress Scan
            let timer = setInterval(() => {
                progress += Math.random() * 5;
                document.getElementById('progress-text').innerText = `Scanning Area: ${Math.floor(progress)}%`;
                
                if (progress >= 100) {
                    clearInterval(timer);
                    document.getElementById('progress-text').innerText = "STATUS: TARGET DETECTED!";
                    spawnMonsterInWorld();
                }
            }, 400);
        }

        function spawnMonsterInWorld() {
            document.getElementById('scan-msg').style.display = 'none';
            document.getElementById('btn-capture').style.display = 'block';

            const monster = document.getElementById('monster');
            
            // Pola Level: Radius acak menjauh setiap level
            let level = Math.floor((day-1)/30)+1;
            let radius = 2 + (level * 2);
            let angle = Math.random() * Math.PI * 2;
            
            let x = Math.cos(angle) * radius;
            let z = Math.sin(angle) * radius;

            // KUNCI: Posisi ditaruh di World Space (bukan relatif ke kamera)
            monster.setAttribute('position', `${x} -1.6 ${z}`); 
            monster.setAttribute('visible', 'true');
        }

        function captureMonster() {
            const raycaster = document.querySelector('[raycaster]').components.raycaster;
            if (raycaster.intersections.length > 0) {
                localStorage.setItem('monster_hunt_day', day + 1);
                localStorage.setItem('monster_hunt_last_date', new Date().toDateString());
                alert("SUKSES! Monster tertangkap.");
                location.reload();
            } else {
                alert("GAGAL! Monster tidak ada dalam bidikan radar.");
            }
        }
    </script>
</body>
</html>
