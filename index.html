<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>GPS Haunted Forest - Joystick Edition</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nipplejs/0.9.1/nipplejs.min.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #050505; }
        
        #boot-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #f00; z-index: 9999; display: flex; flex-direction: column;
            align-items: center; justify-content: center; text-align: center;
        }
        .btn-boot {
            padding: 20px 40px; background: #900; color: #fff; border: 2px solid white;
            font-weight: bold; cursor: pointer; border-radius: 5px; font-size: 1.2em;
            box-shadow: 0 0 20px #f00;
        }

        .ui-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; display: none; flex-direction: column; align-items: center; 
        }
        .status-panel {
            margin-top: 20px; background: rgba(0, 0, 0, 0.9); color: #0f0; 
            padding: 15px; border: 2px solid #0f0; border-radius: 5px; text-align: center;
            pointer-events: auto; width: 85%;
        }
        
        /* Joystick Container */
        #joystick-zone {
            position: fixed; bottom: 40px; left: 40px; width: 120px; height: 120px;
            z-index: 100; pointer-events: auto;
        }

        .crosshair {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 40px; height: 40px; z-index: 100; pointer-events: none;
        }
        .crosshair::before, .crosshair::after {
            content: ''; position: absolute; background: rgba(0, 255, 0, 0.5);
        }
        .crosshair::before { top: 50%; left: 0; width: 100%; height: 2px; }
        .crosshair::after { left: 50%; top: 0; width: 2px; height: 100%; }

        .btn-capture {
            position: fixed; bottom: 40px; right: 40px; padding: 25px; 
            background: radial-gradient(circle, #ff0000, #660000); color: white; 
            border: 3px solid white; border-radius: 50%; font-weight: bold;
            cursor: pointer; z-index: 100; pointer-events: auto; display: none;
        }

        .btn-fullscreen {
            position: fixed; top: 20px; right: 20px; padding: 10px;
            background: rgba(255,255,255,0.2); border: 1px solid white; color: white;
            z-index: 101; cursor: pointer; pointer-events: auto; font-size: 0.7em;
        }
    </style>
</head>

<body>
    <div id="boot-screen">
        <h1 style="margin-bottom: 30px; letter-spacing: 3px;">HAUNTED FOREST</h1>
        <p>Gunakan GPS atau Joystick untuk mendekati target.</p>
        <button class="btn-boot" onclick="requestGPSSystem()">MULAI PERBURUAN</button>
    </div>

    <div class="ui-overlay" id="game-ui">
        <button class="btn-fullscreen" onclick="toggleFullScreen()">FULLSCREEN</button>
        <div class="status-panel">
            <div id="day-text">HARI 1</div>
            <div id="distance-info">MENCARI SINYAL...</div>
            <div id="target-count">TARGET: 1/5</div>
        </div>
        
        <div class="crosshair"></div>
        <div id="joystick-zone"></div>
        <button id="btn-capture" class="btn-capture" onclick="attemptCapture()">TANGKAP!</button>
    </div>

    <a-scene vr-mode-ui="enabled: false" fog="type: exponential; color: #030504; density: 0.12;">
        <a-assets>
            <img id="forest-360" src="https://live.staticflickr.com/65535/51230419355_09a47161b3_k.jpg" crossorigin="anonymous">
        </a-assets>

        <a-sky id="background" src="#forest-360"></a-sky>
        
        <a-entity id="monster-target" 
                  gltf-model="" 
                  scale="2 2 2" 
                  visible="false"
                  class="targetable">
        </a-entity>

        <a-entity id="rig" position="0 0 0">
            <a-entity camera look-controls position="0 1.6 0">
                <a-entity raycaster="objects: .targetable; far: 100" cursor="rayOrigin: mouse;"></a-entity>
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const monsterFiles = ["sirenhead.glb", "cartooncat.glb", "backrooms.glb", "scp173.glb", "wuggy.glb"];
        let currentDay = parseInt(localStorage.getItem('monster_hunt_day')) || 1;
        let lastDate = localStorage.getItem('monster_hunt_last_date');
        let dailyTargets = JSON.parse(localStorage.getItem('monster_hunt_targets')) || [];
        let capturedTodayCount = parseInt(localStorage.getItem('monster_hunt_captured_today')) || 0;
        
        let userGPS = { lat: 0, lon: 0 };
        let currentMonsterGPS = { lat: 0, lon: 0 };
        let joystickOffset = { x: 0, z: 0 }; // Untuk pergerakan manual
        let isSystemReady = false;

        function toggleFullScreen() {
            if (!document.fullscreenElement) document.documentElement.requestFullscreen();
            else document.exitFullscreen();
        }

        async function requestGPSSystem() {
            try {
                if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                    await DeviceOrientationEvent.requestPermission();
                }
                await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject);
                });
                document.getElementById('boot-screen').style.display = 'none';
                document.getElementById('game-ui').style.display = 'flex';
                initJoystick();
                initGameLogic();
            } catch (err) {
                alert("Izin sensor diperlukan!");
            }
        }

        // Inisialisasi Joystick nipplejs
        function initJoystick() {
            const options = {
                zone: document.getElementById('joystick-zone'),
                mode: 'static',
                position: { left: '50%', top: '50%' },
                color: 'green',
                size: 100
            };
            const manager = nipplejs.create(options);

            manager.on('move', (evt, data) => {
                const speed = 0.000005; // Kecepatan simulasi GPS
                const angle = data.angle.radian;
                const force = data.force;
                
                // Update offset untuk memanipulasi posisi GPS
                joystickOffset.x += Math.cos(angle) * force * speed;
                joystickOffset.z += Math.sin(angle) * force * speed;
            });
        }

        function initGameLogic() {
            const today = new Date().toDateString();
            if (lastDate !== today) {
                dailyTargets = monsterFiles.sort(() => 0.5 - Math.random()).slice(0, 5);
                capturedTodayCount = 0;
                localStorage.setItem('monster_hunt_targets', JSON.stringify(dailyTargets));
                localStorage.setItem('monster_hunt_captured_today', 0);
                localStorage.setItem('monster_hunt_last_date', today);
            }

            if (capturedTodayCount >= 5) {
                document.getElementById('distance-info').innerText = "AREA BERSIH";
                return;
            }

            setupLevelUI();
            isSystemReady = true;
            navigator.geolocation.watchPosition(updateUserPosition, null, { enableHighAccuracy: true });
        }

        function setupLevelUI() {
            let level = Math.floor((currentDay - 1) / 30) + 1;
            document.getElementById('day-text').innerText = `HARI ${currentDay} - LVL ${level}`;
            document.getElementById('target-count').innerText = `TARGET: ${capturedTodayCount + 1}/5`;
        }

        function updateUserPosition(position) {
            // Posisi User = GPS Asli + Manipulasi Joystick
            userGPS.lat = position.coords.latitude + joystickOffset.z;
            userGPS.lon = position.coords.longitude + joystickOffset.x;
            
            if (currentMonsterGPS.lat === 0) spawnNextTarget();
            updateVisuals();
        }

        function spawnNextTarget() {
            let offset = 0.0002; // Spawn sekitar 20 meter dari titik awal
            currentMonsterGPS.lat = userGPS.lat + (Math.random() - 0.5) * offset;
            currentMonsterGPS.lon = userGPS.lon + (Math.random() - 0.5) * offset;
            
            const monster = document.getElementById('monster-target');
            monster.setAttribute('gltf-model', `assets/${dailyTargets[capturedTodayCount]}`);
            monster.setAttribute('visible', 'true');
            document.getElementById('btn-capture').style.display = 'block';
        }

        function updateVisuals() {
            if (!isSystemReady || capturedTodayCount >= 5) return;
            
            // Konversi GPS ke Koordinat Lokal A-Frame
            let deltaY = (currentMonsterGPS.lat - userGPS.lat) * 111320;
            let deltaX = (currentMonsterGPS.lon - userGPS.lon) * 111320 * Math.cos(userGPS.lat * Math.PI / 180);
            
            const monster = document.getElementById('monster-target');
            monster.setAttribute('position', `${deltaX} -1.6 ${-deltaY}`);

            let distance = Math.sqrt(deltaX*deltaX + deltaY*deltaY);
            document.getElementById('distance-info').innerText = `${distance.toFixed(1)} METER`;

            if (distance < 5 && window.navigator.vibrate) window.navigator.vibrate(100);
        }

        function attemptCapture() {
            const raycaster = document.querySelector('[raycaster]').components.raycaster;
            if (raycaster.intersections.length > 0) {
                capturedTodayCount++;
                localStorage.setItem('monster_hunt_captured_today', capturedTodayCount);
                if (capturedTodayCount < 5) {
                    alert("TARGET TERKUNCI! Mencari sinyal berikutnya...");
                    currentMonsterGPS.lat = 0;
                } else {
                    localStorage.setItem('monster_hunt_day', currentDay + 1);
                    alert("MISI SELESAI! Seluruh target hari ini telah dimusnahkan.");
                    location.reload();
                }
                setupLevelUI();
            } else {
                alert("GAGAL! Target berada di luar jangkauan radar.");
            }
        }
    </script>
</body>
</html>
