<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Monster Hunter - 30 Days Challenge</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Courier New', monospace; background: #000; }
        
        /* Layar Awal agar Pop-up Kamera Muncul */
        #entry-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; color: #0f0; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        .ui-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            pointer-events: none; z-index: 10; display: none; flex-direction: column; align-items: center; 
        }

        .status-bar {
            margin-top: 20px; background: rgba(0, 0, 0, 0.85); color: #0f0; 
            padding: 15px; border: 2px solid #0f0; border-radius: 5px; text-align: center;
            pointer-events: auto; width: 80%;
        }

        #scan-label {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.8); color: white; padding: 20px; text-align: center;
            border-radius: 10px; width: 70%; z-index: 11;
        }

        .btn-start {
            padding: 20px 40px; background: #0f0; color: #000; border: none;
            font-weight: bold; font-size: 1.2em; cursor: pointer; border-radius: 5px;
        }

        .btn-capture {
            position: fixed; bottom: 40px; padding: 20px 50px; 
            background: radial-gradient(circle, #ff0000, #660000); color: white; 
            border: 3px solid white; border-radius: 50px; font-weight: bold; font-size: 1.2em;
            cursor: pointer; z-index: 100; pointer-events: auto; display: none;
        }

        #progress-container { width: 100%; background: #333; height: 10px; margin-top: 10px; }
        #progress-bar { width: 0%; background: #0f0; height: 100%; transition: width 0.3s; }
    </style>
</head>

<body>
    <div id="entry-screen">
        <h1>RADAR DETECTED</h1>
        <p>Sistem membutuhkan izin kamera & sensor gerak untuk melacak monster di rumah Anda.</p>
        <button class="btn-start" onclick="startGame()">AKTIFKAN RADAR</button>
    </div>

    <div class="ui-overlay" id="main-ui">
        <div class="status-bar">
            <div id="day-text">HARI 1 - LEVEL 1</div>
            <div id="hint-text" style="font-size: 0.8em; color: #aaa;">Mempersiapkan...</div>
            <div id="progress-container"><div id="progress-bar"></div></div>
        </div>

        <div id="scan-label">
            <b>KALIBRASI AREA</b><br>
            Berjalanlah perlahan ke seluruh ruangan untuk memindai lantai.
        </div>

        <button id="btn-capture" class="btn-capture" onclick="attemptCapture()">TANGKAP!</button>
    </div>

    <a-scene embedded arjs="sourceType: webcam; debugUIEnabled: false; trackingMethod: best;" vr-mode-ui="enabled: false">
        <a-assets id="asset-container"></a-assets>

        <a-entity id="monster-model" 
                  gltf-model="" 
                  scale="0.5 0.5 0.5" 
                  visible="false"
                  class="targetable"
                  animation="property: rotation; to: 0 360 0; loop: true; dur: 10000">
        </a-entity>

        <a-entity camera>
            <a-entity raycaster="objects: .targetable; far: 50" 
                      cursor="rayOrigin: mouse; fuse: false">
            </a-entity>
        </a-entity>
    </a-scene>

    <script>
        const monsterFiles = [
            "new_sirenhead.glb",
            "horror_skunx_cartoon_cat.glb",
            "huggy_wuggy_stylized.glb"
        ];

        let currentDay = parseInt(localStorage.getItem('monster_hunt_day')) || 1;
        let lastPlayed = localStorage.getItem('monster_hunt_last_date');
        let scanProgress = 0;
        let isMonsterSpawned = false;

        function startGame() {
            // Sembunyikan layar entri, tampilkan UI game
            document.getElementById('entry-screen').style.display = 'none';
            document.getElementById('main-ui').style.display = 'flex';
            
            initGameLogic();
        }

        function initGameLogic() {
            const today = new Date().toDateString();
            
            if (lastPlayed === today) {
                document.getElementById('scan-label').innerHTML = "<b style='color:red'>AREA BERSIH</b><br>Monster sudah tertangkap hari ini. Datang lagi besok!";
                return;
            }

            let level = Math.floor((currentDay - 1) / 30) + 1;
            if (level > 10) level = 10;
            
            document.getElementById('day-text').innerText = `HARI ${currentDay} - LEVEL ${level}`;
            const modelIndex = (currentDay - 1) % monsterFiles.length;
            
            const model = document.getElementById('monster-model');
            model.setAttribute('gltf-model', `assets/${monsterFiles[modelIndex]}`);
            document.getElementById('hint-text').innerText = `Mencari: ${monsterFiles[modelIndex].replace('.glb','').replace(/_/g,' ')}`;

            // Mulai proses scanning
            let interval = setInterval(() => {
                scanProgress += Math.random() * 4;
                document.getElementById('progress-bar').style.width = scanProgress + "%";
                
                if (scanProgress >= 100) {
                    clearInterval(interval);
                    finishScan(level);
                }
            }, 500);
        }

        function finishScan(level) {
            document.getElementById('scan-label').style.display = "none";
            document.getElementById('btn-capture').style.display = "block";
            
            const monster = document.getElementById('monster-model');
            
            // Jarak spawn berdasarkan level
            let radius = 3 + (level * 2); 
            let randomX = (Math.random() - 0.5) * radius;
            let randomZ = -(Math.random() * radius + 2);
            
            // Y -1.6 agar nempel lantai
            monster.setAttribute('position', `${randomX} -1.6 ${randomZ}`);
            monster.setAttribute('visible', 'true');
            isMonsterSpawned = true;
        }

        function attemptCapture() {
            const raycaster = document.querySelector('[raycaster]').components.raycaster;
            const intersections = raycaster.intersections;

            if (intersections.length > 0) {
                const today = new Date().toDateString();
                localStorage.setItem('monster_hunt_day', currentDay + 1);
                localStorage.setItem('monster_hunt_last_date', today);
                
                alert("TARGET TERKUNCI! Monster berhasil ditangkap.");
                location.reload(); 
            } else {
                if (window.navigator.vibrate) window.navigator.vibrate(100);
                alert("MELÉSET! Arahkan kamera tepat ke posisi monster.");
            }
        }
    </script>
</body>
</html>
